name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  publish:
    name: Publish image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Export image
        id: image
        run: echo "image=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  deploy-azure-container-app:
    name: Deploy Azure Container App
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ vars.AZURE_CONTAINER_APP_NAME != '' && vars.AZURE_RESOURCE_GROUP != '' }}

    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure registry credentials
        uses: azure/cli@v3
        with:
          inlineScript: |
            az containerapp registry set \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --server ghcr.io \
              --username "${{ github.repository_owner }}" \
              --password "${{ secrets.GHCR_TOKEN }}"

      - name: Set runtime secrets
        uses: azure/cli@v3
        with:
          inlineScript: |
            az containerapp secret set \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --secrets \
                azure-devops-pat="${{ secrets.AZURE_DEVOPS_PAT }}" \
                mcp-auth-token="${{ secrets.MCP_AUTH_TOKEN }}"

      - name: Deploy image
        uses: azure/cli@v3
        with:
          inlineScript: |
            ENV_VARS=(
              "PORT=3000"
              "MCP_HTTP_PATH=/mcp"
              "AZURE_DEVOPS_ORG=${{ secrets.AZURE_DEVOPS_ORG }}"
              "AZURE_DEVOPS_PROJECT=${{ secrets.AZURE_DEVOPS_PROJECT }}"
              "AZURE_DEVOPS_PAT=secretref:azure-devops-pat"
              "MCP_AUTH_TOKEN=secretref:mcp-auth-token"
            )

            if [ -n "${{ secrets.AZURE_DEVOPS_ORG_URL }}" ]; then
              ENV_VARS+=("AZURE_DEVOPS_ORG_URL=${{ secrets.AZURE_DEVOPS_ORG_URL }}")
            fi

            az containerapp update \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${{ needs.publish.outputs.image }}" \
              --set-env-vars "${ENV_VARS[@]}"

      - name: Smoke test deployment
        uses: azure/cli@v3
        with:
          inlineScript: |
            FQDN="$(az containerapp show \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query properties.configuration.ingress.fqdn \
              --output tsv)"

            if [ -z "$FQDN" ]; then
              echo "Azure Container App does not expose an ingress FQDN."
              exit 1
            fi

            HEALTH_URL="https://$FQDN/healthz"
            MCP_URL="https://$FQDN/mcp"

            for attempt in $(seq 1 20); do
              health_code="$(curl -sS -o /tmp/healthz-response.txt -w '%{http_code}' "$HEALTH_URL" || true)"
              if [ "$health_code" = "200" ]; then
                break
              fi

              if [ "$attempt" -eq 20 ]; then
                echo "Health check failed with status: ${health_code:-none}"
                cat /tmp/healthz-response.txt 2>/dev/null || true
                exit 1
              fi

              sleep 15
            done

            mcp_code="$(curl -sS -o /tmp/mcp-response.txt -w '%{http_code}' "$MCP_URL" || true)"
            if [ "$mcp_code" != "401" ]; then
              echo "Expected unauthenticated MCP endpoint to return 401, got: ${mcp_code:-none}"
              cat /tmp/mcp-response.txt 2>/dev/null || true
              exit 1
            fi
