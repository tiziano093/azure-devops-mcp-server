name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"
        type: choice
        options:
          - production

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ─── 1. Build & push Docker image ───────────────────────────────────────────
  publish:
    name: Build and push image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha-tag: ${{ steps.meta.outputs.sha-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          SHA_TAG="sha-${{ github.sha }}"
          echo "sha-tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

          # Build the full tag list: sha + latest, plus semver for version tags
          TAGS="${{ env.IMAGE_NAME }}:${SHA_TAG}"
          TAGS="${TAGS},${{ env.IMAGE_NAME }}:latest"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS="${TAGS},${{ env.IMAGE_NAME }}:${VERSION}"
            # Also tag major.minor (e.g. v1.2.3 → v1.2)
            MINOR_TAG="$(echo "${VERSION}" | sed -E 's/^(v[0-9]+\.[0-9]+)\..*/\1/')"
            if [[ "${MINOR_TAG}" != "${VERSION}" ]]; then
              TAGS="${TAGS},${{ env.IMAGE_NAME }}:${MINOR_TAG}"
            fi
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.IMAGE_NAME }}:${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

  # ─── 2. Provision Azure infrastructure (idempotent Bicep) ───────────────────
  provision:
    name: Provision Azure infrastructure
    runs-on: ubuntu-latest
    needs: publish
    if: >
      vars.AZURE_CONTAINER_APP_NAME != '' &&
      vars.AZURE_RESOURCE_GROUP != ''

    outputs:
      fqdn: ${{ steps.deploy.outputs.fqdn }}
      health-url: ${{ steps.deploy.outputs.health-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        uses: azure/cli@v3
        with:
          inlineScript: |
            az group create \
              --name "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --location "${{ vars.AZURE_LOCATION || 'westeurope' }}" \
              --tags "managed-by=github-actions" "repo=${{ github.repository }}" \
              --output none

      - name: Deploy Bicep template
        id: deploy
        uses: azure/cli@v3
        with:
          inlineScript: |
            RESULT=$(az deployment group create \
              --name "mcp-$(date +%Y%m%d%H%M%S)" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --template-file infra/main.bicep \
              --parameters \
                containerAppName="${{ vars.AZURE_CONTAINER_APP_NAME }}" \
                imageName="${{ needs.publish.outputs.image }}" \
                azureDevOpsOrg="${{ secrets.AZURE_DEVOPS_ORG }}" \
                azureDevOpsPat="${{ secrets.AZURE_DEVOPS_PAT }}" \
                azureDevOpsProject="${{ secrets.AZURE_DEVOPS_PROJECT || '' }}" \
                mcpAuthToken="${{ secrets.MCP_AUTH_TOKEN }}" \
                ghcrUsername="${{ github.repository_owner }}" \
                ghcrToken="${{ secrets.GHCR_TOKEN }}" \
              --output json)

            FQDN=$(echo "$RESULT" | jq -r '.properties.outputs.fqdn.value')
            HEALTH_URL=$(echo "$RESULT" | jq -r '.properties.outputs.healthUrl.value')

            echo "fqdn=${FQDN}" >> "$GITHUB_OUTPUT"
            echo "health-url=${HEALTH_URL}" >> "$GITHUB_OUTPUT"
            echo "Deployed to: https://${FQDN}/mcp"

  # ─── 3. Deploy new image to existing Container App ──────────────────────────
  deploy:
    name: Deploy image
    runs-on: ubuntu-latest
    needs: [publish, provision]
    if: >
      always() &&
      needs.publish.result == 'success' &&
      (needs.provision.result == 'success' || needs.provision.result == 'skipped') &&
      vars.AZURE_CONTAINER_APP_NAME != '' &&
      vars.AZURE_RESOURCE_GROUP != ''

    outputs:
      previous-image: ${{ steps.save-previous.outputs.image }}

    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Save current image for potential rollback
        id: save-previous
        uses: azure/cli@v3
        with:
          inlineScript: |
            CURRENT=$(az containerapp show \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query "properties.template.containers[0].image" \
              --output tsv 2>/dev/null || echo "")
            echo "image=${CURRENT}" >> "$GITHUB_OUTPUT"

      - name: Update Container App image
        uses: azure/cli@v3
        with:
          inlineScript: |
            az containerapp update \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${{ needs.publish.outputs.image }}" \
              --output none

      - name: Update runtime secrets
        uses: azure/cli@v3
        with:
          inlineScript: |
            az containerapp secret set \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --secrets \
                azure-devops-pat="${{ secrets.AZURE_DEVOPS_PAT }}" \
                mcp-auth-token="${{ secrets.MCP_AUTH_TOKEN }}" \
              --output none

      - name: Update environment variables
        uses: azure/cli@v3
        with:
          inlineScript: |
            ENV_VARS=(
              "PORT=3000"
              "MCP_HTTP_PATH=/mcp"
              "AZURE_DEVOPS_ORG=${{ secrets.AZURE_DEVOPS_ORG }}"
              "AZURE_DEVOPS_PROJECT=${{ secrets.AZURE_DEVOPS_PROJECT }}"
              "AZURE_DEVOPS_PAT=secretref:azure-devops-pat"
              "MCP_AUTH_TOKEN=secretref:mcp-auth-token"
              "CACHE_TTL_SECONDS=60"
              "CACHE_MAX_SIZE=500"
            )

            if [ -n "${{ secrets.AZURE_DEVOPS_ORG_URL }}" ]; then
              ENV_VARS+=("AZURE_DEVOPS_ORG_URL=${{ secrets.AZURE_DEVOPS_ORG_URL }}")
            fi

            az containerapp update \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --set-env-vars "${ENV_VARS[@]}" \
              --output none

  # ─── 4. Post-deployment health check ────────────────────────────────────────
  verify:
    name: Verify deployment
    runs-on: ubuntu-latest
    needs: [provision, deploy]
    if: >
      always() &&
      needs.deploy.result == 'success'

    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve health check URL
        id: url
        uses: azure/cli@v3
        with:
          inlineScript: |
            FQDN=$(az containerapp show \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query "properties.configuration.ingress.fqdn" \
              --output tsv)
            echo "health-url=https://${FQDN}/healthz" >> "$GITHUB_OUTPUT"
            echo "mcp-url=https://${FQDN}/mcp" >> "$GITHUB_OUTPUT"

      - name: Poll /healthz until ready (90 s timeout)
        id: healthcheck
        run: |
          URL="${{ steps.url.outputs.health-url }}"
          MCP_URL="${{ steps.url.outputs.mcp-url }}"
          echo "Polling ${URL} ..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${URL}" || echo "000")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [ "${STATUS}" = "200" ]; then
              echo "Health check passed."
              MCP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${MCP_URL}" || echo "000")
              if [ "${MCP_STATUS}" != "401" ]; then
                echo "MCP endpoint check failed: expected 401, got ${MCP_STATUS}"
                exit 1
              fi
              echo "MCP endpoint check passed."
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed after 90 seconds."
          exit 1

  # ─── 5. Rollback on failed health check ─────────────────────────────────────
  rollback:
    name: Rollback on failure
    runs-on: ubuntu-latest
    needs: [deploy, verify]
    if: >
      always() &&
      needs.verify.result == 'failure' &&
      needs.deploy.outputs.previous-image != ''

    steps:
      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Rollback to previous image
        uses: azure/cli@v3
        with:
          inlineScript: |
            PREVIOUS="${{ needs.deploy.outputs.previous-image }}"
            echo "Rolling back to: ${PREVIOUS}"
            az containerapp update \
              --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${PREVIOUS}" \
              --output none
            echo "Rollback complete."

      - name: Fail pipeline after rollback
        run: |
          echo "Deployment health check failed. Rolled back to previous image."
          exit 1
