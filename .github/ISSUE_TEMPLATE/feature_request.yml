name: Feature request
description: Propose a new capability or tool
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should change?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, tool behavior, or user workflow you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: security
    attributes:
      label: Security and permissions impact
      description: Note whether this changes required PAT scopes, auth, write operations, or auditability.
